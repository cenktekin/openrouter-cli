# Test Configuration for MCP Operations

# API Configuration
api:
  base_url: "https://openrouter.ai/api/v1"
  model: "anthropic/claude-3-7-sonnet"
  timeout: 5
  max_retries: 2

# File Operations
file_ops:
  allowed_extensions:
    - .txt
    - .md
    - .py
  max_file_size: 1024  # 1KB for testing
  cache_dir: ".test_cache"
  cache_ttl: 3600  # 1 hour for testing

# Processing
processing:
  max_workers: 2
  batch_size: 5
  concurrent_operations: true

# Model Configuration
models:
  default:
    name: "anthropic/claude-3-7-sonnet"
    temperature: 0.7
    max_tokens: 100
  test_analysis:
    name: "anthropic/claude-3-7-sonnet"
    temperature: 0.5
    max_tokens: 50

# Test Prompts
prompts:
  test_analysis: "Test analysis prompt"
  file_analysis: "Test file analysis prompt"

# Output Formatting
output:
  format: "json"
  indent: 2
  include_timestamp: true
  include_metadata: true

# Logging
logging:
  level: "DEBUG"
  format: "%(message)s"
  date_format: "[%X]"
  file: "test_mcp_ops.log"
  max_size: 1048576  # 1MB
  backup_count: 2

# Security
security:
  allowed_directories:
    - "."
    - "./test_data"
  require_authentication: true
  encrypt_cache: false  # Disabled for testing
  validate_paths: true

# Monitoring
monitoring:
  enabled: false  # Disabled for testing
  metrics_port: 9091
  health_check_interval: 10
  alert_thresholds:
    error_rate: 0.2
    response_time: 2.0
    cache_hit_ratio: 0.7
