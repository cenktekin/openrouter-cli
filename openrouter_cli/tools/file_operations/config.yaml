# AI-powered file operations configuration

# API Configuration
api:
  key: ${OPENROUTER_API_KEY}  # Use environment variable
  url: "https://openrouter.ai/api/v1/chat/completions"
  timeout: 30  # seconds
  retry:
    max_attempts: 3
    backoff_factor: 2
    max_delay: 60
  rate_limit:
    requests_per_minute: 60
    burst_limit: 10

# File Operations
files:
  base_dir: "."
  cache_dir: ".ai_cache"
  max_size: 10  # MB
  allowed_extensions:
    images:
      - ".jpg"
      - ".jpeg"
      - ".png"
      - ".gif"
      - ".bmp"
      - ".webp"
      - ".tiff"
    pdfs:
      - ".pdf"
  compression:
    enabled: true
    level: 6  # 0-9, higher means better compression but slower
    format: "zip"  # zip, tar.gz, tar.bz2

# Processing
processing:
  max_workers: 4
  cache_ttl: 86400  # 24 hours in seconds
  batch_size: 10  # Number of files to process in parallel
  timeout: 300  # seconds per file
  memory_limit: 1024  # MB
  priority:
    enabled: true
    strategy: "fifo"  # fifo, lifo, size, age

# Model Configuration
models:
  image:
    default: "openai/gpt-4-vision-preview"
    ocr: "mistral-ocr"
    description: "openai/gpt-4-vision-preview"
    custom:
      - name: "custom-vision"
        model: "openai/gpt-4-vision-preview"
        max_tokens: 1000
        temperature: 0.7
  pdf:
    default: "anthropic/claude-3-opus-20240229"
    summary: "anthropic/claude-3-opus-20240229"
    extraction: "anthropic/claude-3-opus-20240229"
    custom:
      - name: "custom-pdf"
        model: "anthropic/claude-3-opus-20240229"
        max_tokens: 2000
        temperature: 0.5

# Default Prompts
prompts:
  image: "What's in this image?"
  pdf: "What are the main points in this document?"
  templates:
    image_analysis:
      - name: "detailed"
        prompt: "Provide a detailed analysis of this image, including objects, people, setting, and any notable details."
      - name: "summary"
        prompt: "Give a brief summary of what's in this image."
      - name: "technical"
        prompt: "Analyze the technical aspects of this image, including composition, lighting, and quality."
    pdf_analysis:
      - name: "summary"
        prompt: "Summarize the key points and main arguments in this document."
      - name: "extract"
        prompt: "Extract all important facts, figures, and conclusions from this document."
      - name: "structure"
        prompt: "Analyze the structure and organization of this document."

# Output Formatting
output:
  colors: true
  indent: 2
  show_timestamps: true
  show_file_info: true
  format:
    date: "%Y-%m-%d %H:%M:%S"
    file_info: true
    progress_bar: true
    summary: true
  export:
    enabled: false
    format: "json"  # json, yaml, csv
    directory: "exports"
    include_metadata: true

# Logging
logging:
  level: "INFO"
  file: "ai_ops.log"
  max_size: 10485760  # 10MB
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - type: "file"
      enabled: true
    - type: "console"
      enabled: true
    - type: "syslog"
      enabled: false
      facility: "user"

# Security
security:
  encryption:
    enabled: true
    algorithm: "AES-256-GCM"
    key_rotation: 86400  # 24 hours
  access_control:
    enabled: false
    allowed_users: []
    allowed_groups: []
  audit:
    enabled: true
    log_operations: true
    log_access: true

# Monitoring
monitoring:
  enabled: true
  metrics:
    - name: "processing_time"
      type: "histogram"
    - name: "cache_hits"
      type: "counter"
    - name: "api_calls"
      type: "counter"
  alerts:
    - name: "high_latency"
      threshold: 5000  # ms
      action: "notify"
    - name: "error_rate"
      threshold: 0.1  # 10%
      action: "notify"

# Integration
integration:
  webhooks:
    enabled: false
    endpoints: []
  notifications:
    email:
      enabled: false
      smtp_server: ""
      smtp_port: 587
      sender: ""
      recipients: []
    slack:
      enabled: false
      webhook_url: ""
    discord:
      enabled: false
      webhook_url: ""
