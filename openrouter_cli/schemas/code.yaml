name: "code"
description: "Code generation with explanation and dependencies"
schema:
  type: "object"
  properties:
    code:
      type: "string"
      description: "The generated code"
    explanation:
      type: "string"
      description: "Explanation of the code"
    dependencies:
      type: "array"
      items:
        type: "string"
      description: "Required dependencies"
    language:
      type: "string"
      description: "Programming language used"
    complexity:
      type: "string"
      description: "Code complexity level"
    best_practices:
      type: "array"
      items:
        type: "string"
      description: "Best practices applied"
  required: ["code", "explanation", "dependencies", "language"]
