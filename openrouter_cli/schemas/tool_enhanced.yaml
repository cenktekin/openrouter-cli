name: "tool_enhanced"
description: "Response with tool calling capabilities"
schema:
  type: "object"
  properties:
    response:
      type: "string"
      description: "Main response text"
    tool_calls:
      type: "array"
      items:
        type: "object"
        properties:
          tool:
            type: "string"
            description: "Tool name"
            enum: ["web_search", "generate_image", "execute_code"]
          parameters:
            type: "object"
            description: "Tool parameters"
          result:
            type: "object"
            description: "Tool execution result"
          status:
            type: "string"
            description: "Tool execution status"
            enum: ["success", "failed", "pending"]
          error:
            type: "string"
            description: "Error message if tool execution failed"
        required: ["tool", "parameters", "status"]
    confidence:
      type: "number"
      description: "Confidence score (0-1)"
    metadata:
      type: "object"
      properties:
        tool_count:
          type: "integer"
          description: "Number of tools called"
        execution_time:
          type: "number"
          description: "Total tool execution time in seconds"
        tool_types:
          type: "array"
          items:
            type: "string"
          description: "Types of tools used"
  required: ["response", "tool_calls", "confidence"]
