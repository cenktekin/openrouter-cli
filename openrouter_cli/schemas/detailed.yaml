name: "detailed"
description: "Detailed response with analysis and key points"
schema:
  type: "object"
  properties:
    response:
      type: "string"
      description: "The main response text"
    summary:
      type: "string"
      description: "A brief summary of the response"
    key_points:
      type: "array"
      items:
        type: "string"
      description: "Key points from the response"
    analysis:
      type: "object"
      properties:
        sentiment:
          type: "string"
          description: "Overall sentiment of the response"
        complexity:
          type: "string"
          description: "Complexity level of the content"
        topics:
          type: "array"
          items:
            type: "string"
          description: "Main topics covered"
      required: ["sentiment", "complexity", "topics"]
  required: ["response", "summary", "key_points", "analysis"]
