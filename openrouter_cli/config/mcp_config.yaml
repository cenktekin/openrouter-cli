# MCP Server Configuration

# API Configuration
api:
  base_url: "https://openrouter.ai/api/v1"
  model: "anthropic/claude-3-7-sonnet"
  timeout: 30
  max_retries: 3

# File Operations
file_ops:
  allowed_extensions:
    - .txt
    - .md
    - .py
    - .json
    - .yaml
    - .yml
    - .pdf
    - .jpg
    - .jpeg
    - .png
  max_file_size: 10485760  # 10MB
  cache_dir: ".cache"
  cache_ttl: 86400  # 24 hours

# Processing
processing:
  max_workers: 4
  batch_size: 10
  concurrent_operations: true

# Model Configuration
models:
  default:
    name: "anthropic/claude-3-7-sonnet"
    temperature: 0.7
    max_tokens: 1000
  image_analysis:
    name: "anthropic/claude-3-7-sonnet"
    temperature: 0.5
    max_tokens: 500
  pdf_analysis:
    name: "anthropic/claude-3-7-sonnet"
    temperature: 0.3
    max_tokens: 2000

# Default Prompts
prompts:
  image_analysis: "Analyze this image in detail, describing its contents, style, and any notable features."
  pdf_analysis: "Analyze this PDF document, extracting key information, main points, and any important details."
  text_analysis: "Analyze this text file, identifying key themes, patterns, and important information."

# Output Formatting
output:
  format: "json"
  indent: 2
  include_timestamp: true
  include_metadata: true

# Logging
logging:
  level: "INFO"
  format: "%(message)s"
  date_format: "[%X]"
  file: "mcp_ops.log"
  max_size: 10485760  # 10MB
  backup_count: 5

# Security
security:
  allowed_directories:
    - "."
    - "./data"
    - "./output"
  require_authentication: true
  encrypt_cache: true
  validate_paths: true

# Monitoring
monitoring:
  enabled: true
  metrics_port: 9090
  health_check_interval: 30
  alert_thresholds:
    error_rate: 0.1
    response_time: 5.0
    cache_hit_ratio: 0.8
